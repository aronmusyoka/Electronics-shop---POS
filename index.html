<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electronics Shop POS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Electronics Shop POS</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Inventory</a>
      <a href="#">Reports</a>
    </nav>
  </header>

  <main>
    <!-- Products & Cart -->
    <section class="pos">
      <h2>Products</h2>
      <div class="products">
        <button>Samsung Phone - KES 25,000</button>
        <button>LG TV - KES 45,000</button>
        <button>HP Laptop - KES 55,000</button>
        <button>Headphones - KES 3,000</button>
        <button>Digital Camera - KES 20,000</button>
        <button>USB Charger - KES 500</button>
      </div>

      <div class="cart">
        <h3>Cart</h3>
        <ul id="cart-list"></ul>
        <p id="total">Total: KES 0</p>
        <button>Cash Payment</button>
        <button>M-Pesa Payment</button>
      </div>
    </section>
  </main>
</body>
</html>
